services:
  postgres:
    image: postgres:16-alpine
    container_name: postdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postdb
      POSTGRES_USER: postdb
      POSTGRES_PASSWORD: postdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postdb -d postdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postdb_pgdata:/var/lib/postgresql/data

volumes:
  postdb_pgdata:
